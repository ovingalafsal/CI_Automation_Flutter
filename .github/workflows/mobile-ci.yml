name: Mobile CI

on: [push, pull_request]

jobs:
  mobile-pipeline:
    runs-on: macos-latest

    steps:

      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install swiftlint
          npm install

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: stable

      - name: Lint
        run: fastlane lint

      - name: Test
        run: fastlane test

      - name: Coverage
        run: |
          echo "Running Flutter coverage check"
      
          if [ ! -f coverage/lcov.info ]; then
            echo "Coverage file not found!"
            exit 1
          fi
      
          TOTAL=$(grep '^LF:' coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
          COVERED=$(grep '^LH:' coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
      
          SCORE=$((100 * COVERED / TOTAL))
      
          echo "Total lines: $TOTAL"
          echo "Covered lines: $COVERED"
          echo "Coverage score: $SCORE%"
      
          if [ "$SCORE" -lt 80 ]; then
            echo "Coverage below threshold!"
            exit 1
          else
            echo "Coverage check passed"
          fi

      - name: AI Diagnostics
        if: failure()
        run: python3 .practice-tools/ai_triage.py
